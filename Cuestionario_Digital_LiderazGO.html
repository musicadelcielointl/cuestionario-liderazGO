<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionarios LiderazGO — Milton Valle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0D1B2A; color: #eee; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0A1628 0%, #0D2240 60%, #071018 100%); padding: 28px 24px 20px; text-align: center; border-bottom: 4px solid #1B6B3A; position: relative; }
  .header-top { font-size: 12px; letter-spacing: 4px; color: #2DBF72; text-transform: uppercase; margin-bottom: 6px; }
  .header h1 { font-size: 2.4em; font-weight: 800; color: #fff; letter-spacing: -1px; }
  .header h1 span { color: #2DBF72; }
  .header-sub { font-size: 13px; color: #7BBFDC; margin-top: 6px; letter-spacing: 2px; }

  /* SELECTOR DE CAPÍTULO */
  .chapter-selector { background: #0A1628; padding: 20px 16px; border-bottom: 1px solid #1a2a3a; overflow-x: auto; white-space: nowrap; text-align: center; }
  .chapter-selector button { display: inline-block; margin: 4px; padding: 8px 14px; background: #0D2240; color: #7BBFDC; border: 1px solid #1a3a5a; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; white-space: nowrap; }
  .chapter-selector button:hover { background: #1B6B3A; color: #fff; border-color: #2DBF72; }
  .chapter-selector button.active { background: #1B6B3A; color: #fff; border-color: #2DBF72; box-shadow: 0 0 10px rgba(45,191,114,.3); }

  /* CONTENEDOR PRINCIPAL */
  .main { max-width: 820px; margin: 0 auto; padding: 24px 16px 60px; }

  /* CABECERA DEL CAPÍTULO */
  .cap-header { background: linear-gradient(135deg, #0A1628, #0D2240); border: 1px solid #1a3a5a; border-left: 5px solid #2DBF72; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .cap-num { font-size: 11px; letter-spacing: 3px; color: #2DBF72; text-transform: uppercase; margin-bottom: 4px; }
  .cap-titulo { font-size: 1.6em; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .cap-versiculo { font-size: 13px; color: #7BBFDC; font-style: italic; line-height: 1.6; }

  /* PROGRESO */
  .progreso-wrap { background: #0A1628; border: 1px solid #1a3a5a; border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 14px; }
  .progreso-bar-bg { flex: 1; height: 8px; background: #1a2a3a; border-radius: 4px; overflow: hidden; }
  .progreso-bar { height: 100%; background: linear-gradient(90deg, #1B6B3A, #2DBF72); border-radius: 4px; transition: width .4s; }
  .progreso-txt { font-size: 13px; color: #7BBFDC; white-space: nowrap; }

  /* PREGUNTA */
  .pregunta-card { background: #0E1E30; border: 1px solid #1a3a5a; border-radius: 12px; padding: 22px 24px; margin-bottom: 18px; transition: border-color .2s; }
  .pregunta-card.respondida { border-color: #1B6B3A; }
  .pregunta-card.incorrecta { border-color: #c0392b; }
  .pregunta-num { display: inline-block; background: #1B6B3A; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; letter-spacing: 1px; margin-bottom: 10px; }
  .pregunta-texto { font-size: 15px; color: #e0e0e0; line-height: 1.7; margin-bottom: 16px; font-weight: 500; }

  /* OPCIONES */
  .opciones { display: flex; flex-direction: column; gap: 10px; }
  .opcion { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: #0A1628; border: 1.5px solid #1a3a5a; border-radius: 8px; cursor: pointer; transition: all .2s; user-select: none; }
  .opcion:hover:not(.bloqueada) { border-color: #2DBF72; background: #0f2a1a; }
  .opcion.seleccionada { border-color: #2DBF72; background: #0f2a1a; }
  .opcion.correcta { border-color: #2DBF72; background: #0a2a14; }
  .opcion.incorrecta-sel { border-color: #c0392b; background: #2a0a0a; }
  .opcion.bloqueada { cursor: default; }
  .opcion-letra { min-width: 28px; height: 28px; border-radius: 50%; background: #1a2a3a; border: 1.5px solid #2a4a6a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #7BBFDC; transition: all .2s; flex-shrink: 0; }
  .opcion.seleccionada .opcion-letra { background: #1B6B3A; border-color: #2DBF72; color: #fff; }
  .opcion.correcta .opcion-letra { background: #1B6B3A; border-color: #2DBF72; color: #fff; }
  .opcion.incorrecta-sel .opcion-letra { background: #c0392b; border-color: #e74c3c; color: #fff; }
  .opcion-texto { font-size: 14px; color: #d0d0d0; line-height: 1.6; padding-top: 2px; }

  /* FEEDBACK */
  .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; display: none; }
  .feedback.correcto { background: #0a2a14; border: 1px solid #2DBF72; color: #2DBF72; display: block; }
  .feedback.incorrecto { background: #2a0a0a; border: 1px solid #c0392b; color: #e74c3c; display: block; }
  .feedback .icono { font-weight: 800; margin-right: 6px; }

  /* BOTONES */
  .btn-wrap { text-align: center; margin: 28px 0 10px; }
  .btn { padding: 13px 32px; border: none; border-radius: 25px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; letter-spacing: .5px; }
  .btn-verificar { background: linear-gradient(135deg, #1B6B3A, #2DBF72); color: #fff; }
  .btn-verificar:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,191,114,.4); }
  .btn-verificar:disabled { opacity: .4; cursor: default; transform: none; }
  .btn-reiniciar { background: transparent; color: #7BBFDC; border: 1.5px solid #1a3a5a; margin-left: 12px; }
  .btn-reiniciar:hover { border-color: #7BBFDC; color: #fff; }

  /* RESULTADO FINAL */
  .resultado { display: none; background: #0A1628; border: 2px solid #2DBF72; border-radius: 16px; padding: 32px 28px; text-align: center; margin-top: 28px; }
  .resultado.visible { display: block; }
  .resultado-titulo { font-size: 1.4em; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .resultado-score { font-size: 3.5em; font-weight: 900; margin: 16px 0 8px; }
  .resultado-score.excelente { color: #2DBF72; }
  .resultado-score.bien { color: #F4D03F; }
  .resultado-score.mejorar { color: #E74C3C; }
  .resultado-msg { font-size: 15px; color: #aaa; line-height: 1.7; max-width: 500px; margin: 0 auto 24px; }
  .resultado-detalle { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
  .detalle-item { background: #0D2240; padding: 14px 20px; border-radius: 10px; text-align: center; min-width: 100px; }
  .detalle-num { font-size: 1.8em; font-weight: 800; }
  .detalle-num.verde { color: #2DBF72; }
  .detalle-num.rojo { color: #e74c3c; }
  .detalle-label { font-size: 12px; color: #7BBFDC; margin-top: 4px; }

  /* FOOTER */
  .footer { text-align: center; padding: 20px; font-size: 12px; color: #2a4a6a; border-top: 1px solid #1a2a3a; margin-top: 40px; }

  @media(max-width:600px){
    .header h1 { font-size: 1.7em; }
    .main { padding: 16px 12px 40px; }
    .pregunta-card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">Cuestionario Digital</div>
  <h1>Lideraz<span>GO</span></h1>
  <div class="header-sub">Milton Valle &nbsp;·&nbsp; 12 Capítulos &nbsp;·&nbsp; 12 Preguntas cada uno</div>
</div>

<div class="chapter-selector" id="selectorCaps"></div>

<div class="main">
  <div class="cap-header" id="capHeader"></div>
  <div class="progreso-wrap">
    <div class="progreso-bar-bg"><div class="progreso-bar" id="progresoBar" style="width:0%"></div></div>
    <div class="progreso-txt" id="progresoTxt">0 / 12</div>
  </div>
  <div id="preguntasContainer"></div>
  <div class="btn-wrap">
    <button class="btn btn-verificar" id="btnVerificar" onclick="verificar()">Verificar Respuestas</button>
    <button class="btn btn-reiniciar" onclick="reiniciar()">Reiniciar</button>
  </div>
  <div class="resultado" id="resultadoFinal"></div>
</div>

<div class="footer">LiderazGO &copy; Milton Valle &nbsp;|&nbsp; Cuestionario Digital de Estudio</div>

      { texto: "Según la conclusión del capítulo, ¿cómo se mide la verdadera influencia?", opciones: ["Por cuántos la siguen momentáneamente", "Por cuánto impactas en los grandes eventos", "Por cuánto dejas establecido eternamente en otros", "Por los premios y reconocimientos recibidos"], correcta: 2 },
    ]
  },
  {
    num: 12, nombre: "MULTIPLICACIÓN",
    versiculo: '"No es cuántos te siguen, sino cuántos puedes formar y enviar." — LiderazGO',
    preguntas: [
      { texto: "¿Quiénes se juntaron con David en la cueva de Adulam según 1 Samuel 22:1-2?", opciones: ["Los mejores guerreros de Israel", "Hombres afligidos, endeudados y en amargura de espíritu", "Los sacerdotes y profetas del reino", "Los hermanos y familia del rey"], correcta: 1 },
      { texto: "¿Cuántos hombres se juntaron con David en la cueva de Adulam?", opciones: ["Cien hombres", "Doscientos hombres", "Cuatrocientos hombres", "Mil hombres"], correcta: 2 },
      { texto: "¿Cuáles son las cuatro dimensiones de multiplicación descritas en el capítulo?", opciones: ["Evangelismo, discipulado, plantación, misiones", "Academia, Transferencia, Relación, Rompimiento", "Formación, envío, multiplicación, expansión", "Visión, misión, estrategia, resultados"], correcta: 1 },
      { texto: "¿Qué hazaña realizó Adino el eznita según 2 Samuel 23:8?", opciones: ["Derrotó a un ejército de cien hombres", "Mató a ochocientos hombres en una sola ocasión", "Defendió una ciudad él solo por tres días", "Derrotó al gigante Goliat en revancha"], correcta: 1 },
      { texto: "¿Qué hizo Eleazar hijo de Dodo según 2 Samuel 23:9-10?", opciones: ["Cruzó el río Jordán solo para espiar", "Peleó contra los filisteos hasta que su mano se cansó y quedó pegada a la espada", "Detuvo solo a un ejército de cien hombres", "Salvó al rey David de una emboscada"], correcta: 1 },
      { texto: "¿Qué dice 1 Crónicas 12:22 sobre el crecimiento del ejército de David?", opciones: ["Que creció lentamente durante diez años", "Que de día en día venían a David para ayudarle, hasta hacerse un gran ejército, como ejército de Dios", "Que David tuvo que reclutar por la fuerza", "Que nunca llegó a ser un ejército grande"], correcta: 1 },
      { texto: "En 2 Samuel 23:16-17, ¿por qué los tres valientes arriesgaron su vida para traer agua a David?", opciones: ["Porque David se los ordenó bajo pena de muerte", "Porque una profecía les indicó que debían hacerlo", "Nadie los ordenó; fue una respuesta de amor y lealtad a David", "Porque era su turno de guardia ese día"], correcta: 2 },
      { texto: "¿Qué hizo David con el agua que sus valientes le trajeron arriesgando su vida?", opciones: ["La bebió con gratitud y los recompensó", "La utilizó para el sacrificio en el altar", "La derramó para Jehová, diciendo que no podía beber la sangre de sus hombres", "La guardó como símbolo de su victoria"], correcta: 2 },
      { texto: "Según 2 Samuel 21:19-22, ¿qué superaron los hombres de David al final del proceso de formación?", opciones: ["Los ejércitos de todos los reinos vecinos", "Gigantes en Gat, algo que toda una nación creía imposible", "Al ejército del rey Saúl", "A los 850 profetas de Baal"], correcta: 1 },
      { texto: "¿Qué afirma el capítulo sobre la multiplicación de identidad?", opciones: ["Las personas crecen solo por lo que aprenden intelectualmente", "Las personas crecen por la identidad que reciben y lo que constantemente se les afirma", "La identidad no puede transferirse, es innata", "Solo los líderes ungidos pueden transferir identidad"], correcta: 1 },
      { texto: "Según el capítulo, ¿qué evidencia que la multiplicación se completó?", opciones: ["Que el líder tiene muchos seguidores", "Que la iglesia creció en número", "Que los discípulos pueden hacer lo que el líder ya no puede y van más lejos", "Que el ministerio es reconocido internacionalmente"], correcta: 2 },
      { texto: "Según la conclusión del capítulo, ¿cómo se mide la multiplicación verdadera?", opciones: ["Por cuántos dependen de ti", "Por el tamaño de tu ministerio visible", "Por cuántos pueden avanzar, crecer y multiplicar sin ti", "Por cuántas personas conoces en otros países"], correcta: 2 },
    ]
  }
];

// ─── ESTADO ────────────────────────────────────────────────────────────────
let capActual = 0;
let selecciones = {};
let verificado = false;

// ─── INICIALIZACIÓN ────────────────────────────────────────────────────────
function init() {
  const selector = document.getElementById('selectorCaps');
  selector.innerHTML = CAPITULOS.map((c, i) =>
    `<button onclick="cambiarCap(${i})" id="btnCap${i}" class="${i===0?'active':''}">${c.num}. ${c.nombre}</button>`
  ).join('');
  renderCap();
}

function cambiarCap(idx) {
  capActual = idx;
  selecciones = {};
  verificado = false;
  document.querySelectorAll('.chapter-selector button').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderCap();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderCap() {
  const cap = CAPITULOS[capActual];

  document.getElementById('capHeader').innerHTML = `
    <div class="cap-num">Capítulo ${cap.num}</div>
    <div class="cap-titulo">${cap.nombre}</div>
    <div class="cap-versiculo">${cap.versiculo}</div>
  `;

  actualizarProgreso();

  const container = document.getElementById('preguntasContainer');
  container.innerHTML = cap.preguntas.map((p, pi) => `
    <div class="pregunta-card" id="card${pi}">
      <div class="pregunta-num">PREGUNTA ${pi+1} DE 12</div>
      <div class="pregunta-texto">${p.texto}</div>
      <div class="opciones">
        ${p.opciones.map((op, oi) => `
          <div class="opcion" id="op_${pi}_${oi}" onclick="seleccionar(${pi}, ${oi})">
            <div class="opcion-letra">${String.fromCharCode(65+oi)}</div>
            <div class="opcion-texto">${op}</div>
          </div>
        `).join('')}
      </div>
      <div class="feedback" id="fb${pi}"></div>
    </div>
  `).join('');

  document.getElementById('resultadoFinal').classList.remove('visible');
  document.getElementById('btnVerificar').disabled = true;
  document.getElementById('btnVerificar').textContent = 'Verificar Respuestas';
}

function seleccionar(pregIdx, opIdx) {
  if (verificado) return;
  const cap = CAPITULOS[capActual];
  const antes = selecciones[pregIdx];

  // Deseleccionar anterior
  if (antes !== undefined) {
    document.getElementById(`op_${pregIdx}_${antes}`).classList.remove('seleccionada');
  }

  selecciones[pregIdx] = opIdx;
  document.getElementById(`op_${pregIdx}_${opIdx}`).classList.add('seleccionada');

  actualizarProgreso();

  const respondidas = Object.keys(selecciones).length;
  document.getElementById('btnVerificar').disabled = respondidas < cap.preguntas.length;
}

function actualizarProgreso() {
  const total = CAPITULOS[capActual].preguntas.length;
  const resp = Object.keys(selecciones).length;
  const pct = (resp / total) * 100;
  document.getElementById('progresoBar').style.width = pct + '%';
  document.getElementById('progresoTxt').textContent = `${resp} / ${total} respondidas`;
}

function verificar() {
  const cap = CAPITULOS[capActual];
  verificado = true;
  let correctas = 0;

  cap.preguntas.forEach((p, pi) => {
    const sel = selecciones[pi];
    const card = document.getElementById(`card${pi}`);
    const fb = document.getElementById(`fb${pi}`);
    const esCorrecta = sel === p.correcta;

    if (esCorrecta) correctas++;

    // Bloquear todas las opciones
    p.opciones.forEach((_, oi) => {
      const el = document.getElementById(`op_${pi}_${oi}`);
      el.classList.add('bloqueada');
      if (oi === p.correcta) el.classList.add('correcta');
      if (oi === sel && !esCorrecta) el.classList.add('incorrecta-sel');
    });

    card.classList.toggle('respondida', esCorrecta);
    card.classList.toggle('incorrecta', !esCorrecta);

    fb.className = `feedback ${esCorrecta ? 'correcto' : 'incorrecto'}`;
    fb.innerHTML = esCorrecta
      ? `<span class="icono">✓</span> ¡Correcto!`
      : `<span class="icono">✗</span> Incorrecto. La respuesta correcta es: <strong>${p.opciones[p.correcta]}</strong>`;
  });

  // Resultado final
  const pct = Math.round((correctas / cap.preguntas.length) * 100);
  const nivel = pct >= 85 ? 'excelente' : pct >= 60 ? 'bien' : 'mejorar';
  const msgs = {
    excelente: `¡Excelente trabajo! Demostraste que leíste y comprendiste bien el capítulo de <strong>${cap.nombre}</strong>. ¡Sigue adelante con el próximo!`,
    bien: `Buen esfuerzo. Comprendiste la mayor parte del capítulo de <strong>${cap.nombre}</strong>. Te recomendamos releer las secciones donde tuviste dificultad.`,
    mejorar: `Te invitamos a releer el capítulo de <strong>${cap.nombre}</strong> antes de continuar. Cada principio es importante para tu formación.`
  };

  const res = document.getElementById('resultadoFinal');
  res.innerHTML = `
    <div class="resultado-titulo">Resultado del Capítulo ${cap.num}: ${cap.nombre}</div>
    <div class="resultado-score ${nivel}">${pct}%</div>
    <div class="resultado-detalle">
      <div class="detalle-item"><div class="detalle-num verde">${correctas}</div><div class="detalle-label">Correctas</div></div>
      <div class="detalle-item"><div class="detalle-num rojo">${cap.preguntas.length - correctas}</div><div class="detalle-label">Incorrectas</div></div>
      <div class="detalle-item"><div class="detalle-num" style="color:#7BBFDC">12</div><div class="detalle-label">Total</div></div>
    </div>
    <div class="resultado-msg">${msgs[nivel]}</div>
    ${capActual < CAPITULOS.length - 1 ? `<button class="btn btn-verificar" onclick="cambiarCap(${capActual+1})" style="margin-right:10px">Siguiente Capítulo →</button>` : ''}
    <button class="btn btn-reiniciar" onclick="reiniciar()">Intentar de nuevo</button>
  `;
  res.classList.add('visible');

  document.getElementById('btnVerificar').disabled = true;
  document.getElementById('btnVerificar').textContent = '✓ Verificado';

  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function reiniciar() {
  selecciones = {};
  verificado = false;
  renderCap();
  window.scrollTo({top:0, behavior:'smooth'});
}

init();
</script>
</body>
</html>
